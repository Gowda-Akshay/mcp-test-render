services:
  - type: web
    name: mcp-render-server
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: MCP_BEARER_TOKEN
        generateValue: true
      - key: OAUTH_CLIENT_ID
        value: demo-client
      - key: OAUTH_CLIENT_SECRET
        generateValue: true
      - key: PUBLIC_BASE_URL
        sync: false
